  <!-- Darker depths -->
  <rect x="0" y="5" width="2" height="1" fill="#1a5276"/>
  <rect x="12" y="5" width="3" height="1" fill="#1a5276"/>
  <rect x="5" y="9" width="3" height="1" fill="#1a5276"/>
