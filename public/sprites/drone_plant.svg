<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Left rotor blade -->
  <rect x="0" y="3" width="5" height="1" fill="#3ab840"/>
  <!-- Right rotor blade -->
  <rect x="11" y="3" width="5" height="1" fill="#3ab840"/>
  <!-- Body -->
  <rect x="4" y="4" width="8" height="5" fill="#383838"/>
  <rect x="5" y="5" width="6" height="3" fill="#585858"/>
  <!-- Eye/sensor (green) -->
  <rect x="7" y="5" width="2" height="1" fill="#3ab840"/>
  <!-- Arm -->
  <rect x="7" y="9" width="2" height="2" fill="#484848"/>
  <!-- Seed container -->
  <rect x="6" y="11" width="4" height="2" fill="#3ab840"/>
  <!-- Seed drop -->
  <rect x="7" y="13" width="2" height="1" fill="#60d060"/>
  <rect x="7" y="14" width="2" height="1" fill="#2a8830"/>
</svg>
