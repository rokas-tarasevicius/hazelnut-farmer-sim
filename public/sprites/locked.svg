<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Dark ground -->
  <rect width="16" height="16" fill="#1a1208"/>
  <!-- Fence posts -->
  <rect x="1" y="2" width="2" height="12" fill="#3d2b10"/>
  <rect x="7" y="2" width="2" height="12" fill="#3d2b10"/>
  <rect x="13" y="2" width="2" height="12" fill="#3d2b10"/>
  <!-- Fence rails -->
  <rect x="1" y="4" width="14" height="1" fill="#5c4420"/>
  <rect x="1" y="8" width="14" height="1" fill="#5c4420"/>
  <rect x="1" y="12" width="14" height="1" fill="#5c4420"/>
  <!-- Lock icon -->
  <rect x="6" y="5" width="4" height="3" fill="#8a7040"/>
  <rect x="7" y="3" width="2" height="2" fill="none" stroke="#8a7040" stroke-width="1"/>
  <!-- Question mark -->
  <rect x="7" y="6" width="2" height="1" fill="#c0a060"/>
</svg>
