<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Left rotor blade (gold) -->
  <rect x="0" y="2" width="5" height="1" fill="#d4a820"/>
  <!-- Right rotor blade (gold) -->
  <rect x="11" y="2" width="5" height="1" fill="#d4a820"/>
  <!-- Left arm (dark gray) -->
  <rect x="3" y="3" width="3" height="1" fill="#505050"/>
  <!-- Right arm (dark gray) -->
  <rect x="10" y="3" width="3" height="1" fill="#505050"/>
  <!-- Body -->
  <rect x="5" y="2" width="6" height="5" fill="#383838"/>
  <!-- Body top highlight -->
  <rect x="6" y="3" width="4" height="1" fill="#585858"/>
  <!-- Eye/sensor (gold) -->
  <rect x="7" y="5" width="2" height="1" fill="#d4a820"/>
  <!-- Center arm -->
  <rect x="7" y="7" width="2" height="3" fill="#484848"/>
  <!-- Claw crossbar (gold) -->
  <rect x="5" y="10" width="6" height="1" fill="#d4a820"/>
  <!-- Claw left prong (gold) -->
  <rect x="5" y="11" width="1" height="2" fill="#d4a820"/>
  <!-- Claw right prong (gold) -->
  <rect x="10" y="11" width="1" height="2" fill="#d4a820"/>
  <!-- Claw tip highlights -->
  <rect x="5" y="13" width="2" height="1" fill="#e8c840"/>
  <rect x="9" y="13" width="2" height="1" fill="#e8c840"/>
</svg>
