<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Ground -->
  <rect width="16" height="16" fill="#5a8a3c"/>
  <!-- Soil -->
  <rect x="3" y="14" width="10" height="2" fill="#6b5030"/>
  <!-- Trunk -->
  <rect x="7" y="8" width="2" height="6" fill="#5c3a1e"/>
  <rect x="6" y="10" width="1" height="2" fill="#5c3a1e"/>
  <!-- Large canopy -->
  <rect x="3" y="3" width="10" height="2" fill="#2a7a1a"/>
  <rect x="4" y="2" width="8" height="1" fill="#2a7a1a"/>
  <rect x="2" y="5" width="12" height="2" fill="#3a8a2a"/>
  <rect x="3" y="7" width="10" height="1" fill="#4a9a3a"/>
  <rect x="5" y="1" width="6" height="1" fill="#3a8a2a"/>
</svg>
