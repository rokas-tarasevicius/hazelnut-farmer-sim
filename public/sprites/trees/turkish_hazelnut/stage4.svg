<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Soil -->
  <rect x="4" y="15" width="8" height="1" fill="#8B7355"/>
  <!-- Trunk -->
  <rect x="7" y="11" width="2" height="4" fill="#5a3a1a"/>
  <rect x="6" y="13" width="1" height="1" fill="#A0522D"/>
  <rect x="9" y="13" width="1" height="1" fill="#A0522D"/>
  <!-- Wide spreading canopy - bottom -->
  <rect x="2" y="10" width="12" height="1" fill="#1d5a0e"/>
  <rect x="1" y="9" width="13" height="1" fill="#2d6a1e"/>
  <!-- Middle canopy -->
  <rect x="1" y="8" width="14" height="1" fill="#3d7a2e"/>
  <rect x="1" y="7" width="14" height="1" fill="#2d6a1e"/>
  <rect x="2" y="6" width="12" height="1" fill="#3d7a2e"/>
  <!-- Upper canopy -->
  <rect x="3" y="5" width="10" height="1" fill="#2d6a1e"/>
  <rect x="4" y="4" width="8" height="1" fill="#1d5a0e"/>
  <rect x="5" y="3" width="6" height="1" fill="#2d6a1e"/>
  <rect x="6" y="2" width="4" height="1" fill="#1d5a0e"/>
</svg>
