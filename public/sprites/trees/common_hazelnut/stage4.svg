<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Soil -->
  <rect x="4" y="15" width="8" height="1" fill="#8B7355"/>
  <!-- Thicker trunk -->
  <rect x="7" y="9" width="2" height="6" fill="#6b4226"/>
  <rect x="6" y="14" width="1" height="1" fill="#8B6914"/>
  <rect x="9" y="14" width="1" height="1" fill="#8B6914"/>
  <!-- Trunk highlight -->
  <rect x="8" y="10" width="1" height="4" fill="#8B6914"/>
  <!-- Medium round canopy - outer ring -->
  <rect x="4" y="2" width="7" height="1" fill="#4a8630"/>
  <rect x="3" y="3" width="9" height="1" fill="#4a8630"/>
  <rect x="2" y="4" width="11" height="1" fill="#5a9e3a"/>
  <rect x="2" y="5" width="11" height="1" fill="#5a9e3a"/>
  <rect x="2" y="6" width="11" height="1" fill="#5a9e3a"/>
  <rect x="2" y="7" width="11" height="1" fill="#4a8630"/>
  <rect x="3" y="8" width="9" height="1" fill="#4a8630"/>
  <rect x="4" y="9" width="7" height="1" fill="#4a8630"/>
  <!-- Canopy highlights -->
  <rect x="4" y="3" width="3" height="1" fill="#5a9e3a"/>
  <rect x="3" y="4" width="4" height="1" fill="#6bb54e"/>
  <rect x="3" y="5" width="3" height="1" fill="#6bb54e"/>
  <rect x="5" y="3" width="1" height="1" fill="#6bb54e"/>
  <rect x="4" y="6" width="2" height="1" fill="#6bb54e"/>
  <!-- Canopy shadow -->
  <rect x="9" y="6" width="3" height="1" fill="#4a8630"/>
  <rect x="10" y="5" width="2" height="1" fill="#4a8630"/>
  <rect x="10" y="7" width="1" height="1" fill="#4a8630"/>
</svg>
