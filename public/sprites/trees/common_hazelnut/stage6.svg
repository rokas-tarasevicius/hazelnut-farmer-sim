  <rect x="1" y="5" width="13" height="1" fill="#5a9e3a"/>
  <rect x="1" y="6" width="13" height="1" fill="#5a9e3a"/>
  <rect x="1" y="7" width="13" height="1" fill="#5a9e3a"/>
