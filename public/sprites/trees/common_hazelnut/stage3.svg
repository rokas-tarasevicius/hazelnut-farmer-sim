<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Soil -->
  <rect x="5" y="15" width="6" height="1" fill="#8B7355"/>
  <!-- Thin trunk -->
  <rect x="7" y="9" width="1" height="6" fill="#6b4226"/>
  <rect x="7" y="14" width="2" height="1" fill="#6b4226"/>
  <!-- Small round canopy - outer -->
  <rect x="5" y="4" width="5" height="1" fill="#4a8630"/>
  <rect x="4" y="5" width="7" height="1" fill="#4a8630"/>
  <rect x="4" y="6" width="7" height="1" fill="#5a9e3a"/>
  <rect x="4" y="7" width="7" height="1" fill="#5a9e3a"/>
  <rect x="4" y="8" width="7" height="1" fill="#4a8630"/>
  <rect x="5" y="9" width="5" height="1" fill="#4a8630"/>
  <!-- Canopy highlights -->
  <rect x="5" y="5" width="2" height="1" fill="#5a9e3a"/>
  <rect x="5" y="6" width="3" height="1" fill="#6bb54e"/>
  <rect x="6" y="5" width="1" height="1" fill="#6bb54e"/>
  <rect x="5" y="7" width="1" height="1" fill="#6bb54e"/>
  <!-- Canopy shadow -->
  <rect x="8" y="8" width="2" height="1" fill="#4a8630"/>
  <rect x="9" y="7" width="1" height="1" fill="#4a8630"/>
</svg>
