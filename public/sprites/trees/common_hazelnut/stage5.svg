<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Soil -->
  <rect x="3" y="15" width="10" height="1" fill="#8B7355"/>
  <!-- Thick trunk -->
  <rect x="6" y="10" width="3" height="5" fill="#6b4226"/>
  <rect x="5" y="14" width="1" height="1" fill="#6b4226"/>
  <rect x="9" y="14" width="1" height="1" fill="#6b4226"/>
  <!-- Trunk highlight -->
  <rect x="8" y="10" width="1" height="4" fill="#8B6914"/>
  <!-- Trunk bark detail -->
  <rect x="6" y="12" width="1" height="1" fill="#8B6914"/>
  <!-- Large round canopy - full shape -->
  <rect x="4" y="1" width="7" height="1" fill="#4a8630"/>
  <rect x="3" y="2" width="9" height="1" fill="#4a8630"/>
  <rect x="2" y="3" width="11" height="1" fill="#5a9e3a"/>
  <rect x="1" y="4" width="13" height="1" fill="#5a9e3a"/>
  <rect x="1" y="5" width="13" height="1" fill="#5a9e3a"/>
  <rect x="1" y="6" width="13" height="1" fill="#5a9e3a"/>
  <rect x="1" y="7" width="13" height="1" fill="#5a9e3a"/>
  <rect x="2" y="8" width="11" height="1" fill="#4a8630"/>
  <rect x="3" y="9" width="9" height="1" fill="#4a8630"/>
  <rect x="4" y="10" width="7" height="1" fill="#4a8630"/>
  <!-- Canopy highlights (upper-left, light hits from above-left) -->
  <rect x="4" y="2" width="3" height="1" fill="#5a9e3a"/>
  <rect x="3" y="3" width="4" height="1" fill="#6bb54e"/>
  <rect x="2" y="4" width="4" height="1" fill="#6bb54e"/>
  <rect x="2" y="5" width="3" height="1" fill="#6bb54e"/>
  <rect x="3" y="6" width="2" height="1" fill="#6bb54e"/>
  <rect x="5" y="2" width="1" height="1" fill="#6bb54e"/>
  <!-- Canopy shadow (lower-right, darker) -->
  <rect x="10" y="7" width="3" height="1" fill="#4a8630"/>
  <rect x="11" y="6" width="2" height="1" fill="#4a8630"/>
  <rect x="11" y="5" width="2" height="1" fill="#4a8630"/>
  <rect x="9" y="8" width="3" height="1" fill="#4a8630"/>
</svg>
