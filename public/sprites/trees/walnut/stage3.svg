<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Soil -->
  <rect x="5" y="15" width="6" height="1" fill="#8B7355"/>
  <!-- Thick trunk -->
  <rect x="7" y="8" width="2" height="7" fill="#3a2210"/>
  <rect x="6" y="14" width="1" height="1" fill="#4a3218"/>
  <rect x="9" y="14" width="1" height="1" fill="#4a3218"/>
  <!-- Dense round canopy - dark outer -->
  <rect x="5" y="3" width="5" height="1" fill="#1a4a0a"/>
  <rect x="4" y="4" width="7" height="1" fill="#1a4a0a"/>
  <rect x="3" y="5" width="9" height="1" fill="#2a5a1a"/>
  <rect x="3" y="6" width="9" height="1" fill="#2a5a1a"/>
  <rect x="4" y="7" width="7" height="1" fill="#1a4a0a"/>
  <rect x="5" y="8" width="2" height="1" fill="#1a4a0a"/>
  <rect x="9" y="8" width="2" height="1" fill="#1a4a0a"/>
  <!-- Canopy highlights -->
  <rect x="5" y="4" width="2" height="1" fill="#2a5a1a"/>
  <rect x="4" y="5" width="3" height="1" fill="#3a6a2a"/>
  <rect x="5" y="6" width="2" height="1" fill="#3a6a2a"/>
  <!-- Canopy shadow -->
  <rect x="9" y="6" width="2" height="1" fill="#1a4a0a"/>
  <rect x="9" y="7" width="1" height="1" fill="#1a4a0a"/>
</svg>
