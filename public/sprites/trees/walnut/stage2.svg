  <rect x="4" y="6" width="2" height="1" fill="#3a6a2a"/>
  <rect x="6" y="7" width="1" height="2" fill="#2a5a1a"/>
  <rect x="5" y="8" width="1" height="1" fill="#1a4a0a"/>
  <!-- Leaf cluster right -->
  <rect x="9" y="7" width="1" height="1" fill="#2a5a1a"/>
  <rect x="9" y="6" width="2" height="1" fill="#3a6a2a"/>
  <rect x="8" y="7" width="1" height="2" fill="#2a5a1a"/>
  <rect x="9" y="8" width="1" height="1" fill="#1a4a0a"/>
  <!-- Top leaves -->
  <rect x="6" y="5" width="3" height="1" fill="#3a6a2a"/>
  <rect x="7" y="4" width="1" height="1" fill="#2a5a1a"/>
  <rect x="7" y="6" width="1" height="1" fill="#2a5a1a"/>
</svg>
