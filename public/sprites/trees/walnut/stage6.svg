<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Soil -->
  <rect x="4" y="15" width="8" height="1" fill="#8B7355"/>
  <!-- Very thick dark trunk -->
  <rect x="6" y="7" width="3" height="8" fill="#3a2210"/>
  <rect x="5" y="13" width="1" height="2" fill="#4a3218"/>
  <rect x="9" y="12" width="1" height="3" fill="#4a3218"/>
  <rect x="10" y="14" width="1" height="1" fill="#4a3218"/>
  <!-- Trunk bark detail -->
  <rect x="7" y="9" width="1" height="1" fill="#654321"/>
  <rect x="6" y="11" width="1" height="1" fill="#654321"/>
  <rect x="8" y="10" width="1" height="1" fill="#654321"/>
  <!-- Large dense dark canopy - base layer -->
  <rect x="5" y="0" width="5" height="1" fill="#1a4a0a"/>
  <rect x="3" y="1" width="9" height="1" fill="#1a4a0a"/>
  <rect x="2" y="2" width="11" height="1" fill="#2a5a1a"/>
  <rect x="2" y="3" width="12" height="1" fill="#2a5a1a"/>
  <rect x="2" y="4" width="12" height="1" fill="#1a4a0a"/>
  <rect x="2" y="5" width="11" height="1" fill="#1a4a0a"/>
  <rect x="3" y="6" width="10" height="1" fill="#1a4a0a"/>
  <rect x="4" y="7" width="2" height="1" fill="#1a4a0a"/>
  <rect x="10" y="7" width="2" height="1" fill="#1a4a0a"/>
  <!-- Canopy highlights -->
  <rect x="4" y="1" width="3" height="1" fill="#2a5a1a"/>
  <rect x="3" y="2" width="3" height="1" fill="#3a6a2a"/>
  <rect x="4" y="3" width="4" height="1" fill="#3a6a2a"/>
  <rect x="3" y="4" width="3" height="1" fill="#2a5a1a"/>
  <rect x="5" y="5" width="2" height="1" fill="#2a5a1a"/>
  <!-- Canopy deep shadow -->
  <rect x="11" y="3" width="2" height="1" fill="#1a4a0a"/>
  <rect x="11" y="4" width="2" height="1" fill="#1a4a0a"/>
  <rect x="10" y="5" width="2" height="1" fill="#1a4a0a"/>
  <rect x="11" y="2" width="1" height="1" fill="#1a4a0a"/>
  <!-- Walnuts hanging from canopy -->
  <rect x="4" y="6" width="1" height="1" fill="#654321"/>
  <rect x="10" y="6" width="1" height="1" fill="#654321"/>
  <rect x="6" y="7" width="1" height="1" fill="#654321"/>
  <rect x="11" y="5" width="1" height="1" fill="#654321"/>
  <rect x="3" y="5" width="1" height="1" fill="#8B6914"/>
  <!-- Fallen walnuts on ground -->
  <rect x="3" y="14" width="1" height="1" fill="#654321"/>
  <rect x="11" y="14" width="1" height="1" fill="#654321"/>
  <!-- Golden sparkles -->
  <rect x="5" y="1" width="1" height="1" fill="#f0d060"/>
  <rect x="10" y="3" width="1" height="1" fill="#f0d060"/>
  <rect x="3" y="4" width="1" height="1" fill="#f0d060"/>
  <rect x="12" y="5" width="1" height="1" fill="#f0d060"/>
  <rect x="7" y="0" width="1" height="1" fill="#f0d060"/>
</svg>
