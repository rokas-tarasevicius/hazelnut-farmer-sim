<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Soil -->
  <rect x="4" y="15" width="8" height="1" fill="#8B7355"/>
  <!-- Trunk -->
  <rect x="7" y="8" width="2" height="7" fill="#8B6914"/>
  <rect x="6" y="14" width="1" height="1" fill="#a07840"/>
  <rect x="9" y="14" width="1" height="1" fill="#a07840"/>
  <!-- Branch left -->
  <rect x="5" y="8" width="2" height="1" fill="#a07840"/>
  <!-- Branch right -->
  <rect x="9" y="7" width="2" height="1" fill="#a07840"/>
  <!-- Canopy - base layer -->
  <rect x="4" y="3" width="8" height="1" fill="#6ab050"/>
  <rect x="3" y="4" width="10" height="1" fill="#7ac060"/>
  <rect x="3" y="5" width="10" height="1" fill="#8ad070"/>
  <rect x="3" y="6" width="10" height="1" fill="#7ac060"/>
  <rect x="3" y="7" width="10" height="1" fill="#6ab050"/>
  <rect x="4" y="8" width="8" height="1" fill="#6ab050"/>
  <!-- Canopy highlights -->
  <rect x="4" y="4" width="3" height="1" fill="#8ad070"/>
  <rect x="4" y="5" width="4" height="1" fill="#8ad070"/>
  <!-- Pink blossoms -->
  <rect x="9" y="3" width="1" height="1" fill="#e8a0b0"/>
  <rect x="5" y="4" width="1" height="1" fill="#e8a0b0"/>
  <rect x="10" y="5" width="1" height="1" fill="#d48090"/>
  <rect x="4" y="6" width="1" height="1" fill="#e8a0b0"/>
  <rect x="8" y="4" width="1" height="1" fill="#d48090"/>
  <rect x="11" y="7" width="1" height="1" fill="#e8a0b0"/>
  <!-- Canopy shadow -->
  <rect x="10" y="7" width="2" height="1" fill="#6ab050"/>
</svg>
