<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Soil -->
  <rect x="4" y="15" width="8" height="1" fill="#8B7355"/>
  <!-- Trunk -->
  <rect x="7" y="7" width="2" height="8" fill="#8B6914"/>
  <rect x="6" y="13" width="1" height="2" fill="#a07840"/>
  <rect x="9" y="13" width="1" height="2" fill="#a07840"/>
  <!-- Roots -->
  <rect x="5" y="14" width="1" height="1" fill="#8B6914"/>
  <rect x="10" y="14" width="1" height="1" fill="#8B6914"/>
  <!-- Branch left -->
  <rect x="4" y="7" width="3" height="1" fill="#a07840"/>
  <!-- Branch right -->
  <rect x="9" y="6" width="3" height="1" fill="#a07840"/>
  <!-- Canopy - full tree -->
  <rect x="4" y="1" width="8" height="1" fill="#6ab050"/>
  <rect x="3" y="2" width="10" height="1" fill="#7ac060"/>
  <rect x="2" y="3" width="12" height="1" fill="#7ac060"/>
  <rect x="2" y="4" width="12" height="1" fill="#8ad070"/>
  <rect x="2" y="5" width="12" height="1" fill="#7ac060"/>
  <rect x="2" y="6" width="12" height="1" fill="#6ab050"/>
  <rect x="3" y="7" width="10" height="1" fill="#6ab050"/>
  <rect x="4" y="8" width="8" height="1" fill="#6ab050"/>
  <!-- Canopy highlights -->
  <rect x="4" y="2" width="3" height="1" fill="#8ad070"/>
  <rect x="3" y="3" width="4" height="1" fill="#8ad070"/>
  <rect x="3" y="4" width="5" height="1" fill="#8ad070"/>
  <!-- Pink blossom accents -->
  <rect x="10" y="2" width="1" height="1" fill="#e8a0b0"/>
  <rect x="5" y="3" width="1" height="1" fill="#e8a0b0"/>
  <rect x="11" y="4" width="1" height="1" fill="#d48090"/>
  <rect x="3" y="5" width="1" height="1" fill="#e8a0b0"/>
  <rect x="9" y="3" width="1" height="1" fill="#d48090"/>
  <rect x="12" y="5" width="1" height="1" fill="#e8a0b0"/>
  <rect x="6" y="1" width="1" height="1" fill="#e8a0b0"/>
  <rect x="4" y="7" width="1" height="1" fill="#e8a0b0"/>
  <rect x="10" y="6" width="1" height="1" fill="#d48090"/>
  <!-- Canopy shadow -->
  <rect x="11" y="6" width="2" height="1" fill="#6ab050"/>
  <rect x="10" y="7" width="2" height="1" fill="#6ab050"/>
</svg>
